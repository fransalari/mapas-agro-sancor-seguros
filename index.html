<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8"/>

<title>MAPA GIS DE TASAS</title>

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

html,
body {

  margin: 0;
  padding: 0;

  width: 100%;
  height: 100%;

  overflow: hidden;

  font-family: Arial, sans-serif;

}

#map {

  width: 100vw;
  height: 100vh;

}

.leaflet-popup-content {

  font-size: 13px;
  line-height: 1.5;

}

.legend {

  background: white;
  padding: 10px;
  border-radius: 8px;

  line-height: 20px;

  box-shadow:
    0 1px 5px rgba(0,0,0,0.3);

}

.legend i {

  width: 18px;
  height: 18px;

  float: left;
  margin-right: 8px;

  opacity: 0.8;

}

.titleBox {

  background: white;

  padding:
    8px 12px;

  border-radius: 8px;

  box-shadow:
    0 1px 5px rgba(0,0,0,0.3);

  font-weight: bold;

}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

// ======================================
// URL FILTERS
// ======================================

const params =
  new URLSearchParams(
    window.location.search
  );

const filtros = {

  provincia:
    params.get('provincia') || '',

  departamento:
    params.get('departamento') || '',

  cultivo:
    params.get('cultivo') || '',

  cobertura:
    params.get('cobertura') || '',

  n_anios_cat:
    params.get('n_anios_cat') || 'N (dinámico)'

};

console.log(
  'Filtros:',
  filtros
);

// ======================================
// MAPA
// ======================================

const map =
  L.map('map')
    .setView([-35, -63], 5);

L.tileLayer(

  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

  {

    attribution:
      '&copy; OpenStreetMap'

  }

).addTo(map);

// ======================================
// TITULO
// ======================================

const titulo =
  L.control({ position: 'topright' });

titulo.onAdd = function () {

  const div =
    L.DomUtil.create(
      'div',
      'titleBox'
    );

  div.innerHTML =
    'GIS Agro';

  return div;

};

titulo.addTo(map);

// ======================================
// LEYENDA
// ======================================

const legend =
  L.control({ position: 'bottomright' });

legend.onAdd = function () {

  const div =
    L.DomUtil.create(
      'div',
      'legend'
    );

  div.innerHTML = `

    <b>Desvío LC</b><br><br>

    <i style="background:#1a9850"></i>
    Bajo<br>

    <i style="background:#fee08b"></i>
    Medio<br>

    <i style="background:#d73027"></i>
    Alto

  `;

  return div;

};

legend.addTo(map);

// ======================================
// CSV
// ======================================

const csvUrl =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxQFMHwjNrMlzLxa6YylBf3PLQnZc0bgwJM3qT_bzWjBx-0ZaSC_kPgfdpJcqGWQ/pub?output=csv';

let allData = [];

// ======================================
// CARGAR CSV
// ======================================

Papa.parse(csvUrl, {

  download: true,

  header: true,

  complete: function(results) {

    results.data.forEach(row => {

      allData.push({

        geo_id:
          String(
            row.geo_id
          ).trim(),

        provincia:
          row.provincia,

        departamento:
          row.departamento,

        cultivo:
          row.cultivo,

        cobertura:
          row.cobertura,

        n_anios_cat:
          row.n_anios_cat,

        registros:
          parseFloat(
            row.registros
          ),

        anios_considerados:
          parseFloat(
            row.anios_considerados
          ),

        hectareas:
          parseFloat(
            row.hectareas
          ),

        suma_asegurada:
          parseFloat(
            row.suma_asegurada
          ),

        lc:
          parseFloat(
            row.lc_medio_pct
          ),

        lc_cat:
          parseFloat(
            row.lc_mas_cat_pct
          ),

        tasa:
          parseFloat(
            row.tasa_comercial_pct
          ),

        desvio:
          parseFloat(
            row.desvio_lc_pct
          )

      });

    });

    iniciarGIS();

  }

});

// ======================================
// FILTRAR
// ======================================

function filtrarDatos() {

  return allData.filter(d => {

    return (

      (filtros.provincia === '' ||

       d.provincia ===
       filtros.provincia)

      &&

      (filtros.departamento === '' ||

       d.departamento ===
       filtros.departamento)

      &&

      (filtros.cultivo === '' ||

       d.cultivo ===
       filtros.cultivo)

      &&

      (filtros.cobertura === '' ||

       d.cobertura ===
       filtros.cobertura)

      &&

      (filtros.n_anios_cat === '' ||

       d.n_anios_cat ==
       filtros.n_anios_cat)

    );

  });

}

// ======================================
// PROMEDIO
// ======================================

function promedio(arr){

  const validos =
    arr.filter(
      v => !isNaN(v)
    );

  if(validos.length === 0)
    return 0;

  return (

    validos.reduce(
      (a,b)=>a+b,
      0
    )

    / validos.length

  );

}

// ======================================
// AGRUPAR
// ======================================

function agruparDepartamentos(datos) {

  const grupos = {};

  datos.forEach(d => {

    if(!grupos[d.geo_id]){

      grupos[d.geo_id] = {

        geo_id:
          d.geo_id,

        provincia:
          d.provincia,

        departamento:
          d.departamento,

        hectareas: 0,

        suma: 0,

        lc: [],

        lc_cat: [],

        tasa: [],

        desvio: []

      };

    }

    grupos[d.geo_id]
      .hectareas +=
      d.hectareas;

    grupos[d.geo_id]
      .suma +=
      d.suma_asegurada;

    grupos[d.geo_id]
      .lc.push(d.lc);

    grupos[d.geo_id]
      .lc_cat.push(d.lc_cat);

    grupos[d.geo_id]
      .tasa.push(d.tasa);

    grupos[d.geo_id]
      .desvio.push(d.desvio);

  });

  Object.values(grupos)
    .forEach(g => {

    g.lc =
      promedio(g.lc);

    g.lc_cat =
      promedio(g.lc_cat);

    g.tasa =
      promedio(g.tasa);

    g.desvio =
      promedio(g.desvio);

  });

  return grupos;

}

// ======================================
// INICIAR GIS
// ======================================

function iniciarGIS(){

  const datosFiltrados =
    filtrarDatos();

  const datosAgrupados =
    agruparDepartamentos(
      datosFiltrados
    );

  fetch(

    'https://raw.githubusercontent.com/fransalari/mapas-agro/main/admin_boundaries_vf.json'

  )

  .then(
    response => response.json()
  )

  .then(data => {

    const geojsonLayer =
      L.geoJSON(data, {

      style: function(feature){

        const id =
          String(
            feature.properties.gid_dpto
          ).trim();

        const info =
          datosAgrupados[id];

        let desvio =
          info
            ? info.desvio
            : 0;

        let color =

          desvio > 10
            ? '#d73027'

          :

          desvio > 5
            ? '#fee08b'

          :

            '#1a9850';

        return {

          color: '#555',

          weight: 1,

          fillColor: color,

          fillOpacity: 0.75

        };

      },

      onEachFeature:
        function(feature, layer){

        const id =
          String(
            feature.properties.gid_dpto
          ).trim();

        const info =
          datosAgrupados[id];

        if(info){

          layer.bindPopup(`

            <b>
              ${info.departamento}
            </b><br><br>

            Provincia:
            ${info.provincia}<br>

            LC Medio:
            ${info.lc.toFixed(1)}%<br>

            LC + CAT:
            ${info.lc_cat.toFixed(1)}%<br>

            Tasa:
            ${info.tasa.toFixed(1)}%<br>

            Desvío:
            ${info.desvio.toFixed(1)}%<br>

            Hectáreas:
            ${info.hectareas.toLocaleString()}<br>

            Suma Asegurada:
            ${info.suma.toLocaleString()}

          `);

        }

      }

    }).addTo(map);

    map.fitBounds(
      geojsonLayer.getBounds()
    );

  });

}

</script>

</body>
</html>
